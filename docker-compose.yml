version: "3.8"

services:
  mongo:
    image: mongo:6.0
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 123456

  node-api:
    build: ./node-api
    container_name: node-api
    ports:
      - "3000:3000"
    env_file:
      - ./node-api/.env
    depends_on:
      - mongo